<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>まるばつげーむ</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="wrapper">
      <div id="main-wrapper">
        <script type="module" src="./main.js"></script>
        <div id="game-menu">
          <h1 id="game-title">まるばつげーむ</h1>
          <div id="game-menu-main">
            <div id="game-title-img">画像を用意したかったんですが、用意できませんでした。</div>
            <button id="start_btn">スタート</button>
          </div>

          <div id="game-menu-select">
            <div id="room-menu">
              <button id="create-room">部屋を作成</button>
              <button id="conect-room">部屋に参加</button>
            </div>

            <div id="create-room-conect">
              <div id="room-conect-view">部屋番号: 1</div>
              <button id="room-number-add">+</button>
              <button id="room-number-sub">-</button>
              <button id="room-number-enter">決定</button>
            </div>

            <div id="conect-room-view">
              <div id="conect-message">対戦相手を待っています...</div>
            </div>

            <div id="create-room-menu">
              <div id="room-id-view">部屋番号: </div>
              <button id="game-start">対戦相手が未接続です</button>
            </div>

          </div>
        </div>

        <div id="game-play">
          <canvas id="canvas" width="192" height="192"></canvas>
          <div id="game-play-main">
            <button id="enter_btn">決定</button>
          </div>

          <div id="game-play-stop">
            <button id="stop_btn">ストップ</button>
          </div>
        </div>
      </div>
    </div>
